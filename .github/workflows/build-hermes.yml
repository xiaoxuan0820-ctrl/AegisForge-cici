name: Build Hermes-Agent-Phone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Hermes-Agent-Phone
        uses: actions/checkout@v4
        with:
          repository: rfdiosuao/Hermes-Agent-phone
          path: hermes-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x hermes-android/gradlew

      - name: Patch repositories for build compatibility
        working-directory: hermes-android
        run: |
          # 添加 Google Maven 仓库作为阿里云镜像的备选
          cat >> settings.gradle.kts << 'PATCH'

          // Patched repositories for CI
          dependencyResolutionManagement {
              repositories {
                  mavenCentral()
                  google()
              }
          }
          PATCH

      - name: Build Debug APK
        working-directory: hermes-android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload Hermes APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-phone-apk
          path: hermes-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
