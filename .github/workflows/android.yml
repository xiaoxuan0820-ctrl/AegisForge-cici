name: Build AutoDroid APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout AutoDroid
        uses: actions/checkout@v4
        with:
          repository: solivansprvill-droid/AutoDroid
          path: autodroid-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x autodroid-android/gradlew

      - name: Build with Gradle
        working-directory: autodroid-android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autodroid-debug-apk
          path: autodroid-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
